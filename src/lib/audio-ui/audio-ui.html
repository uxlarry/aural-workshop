<section class="audio-mixer">
  @for (channel of channels(); track channel.id) {
  <article class="channel-strip">
    <header class="channel-title">{{ channel.label }}</header>

    <div class="mixer-visual" aria-label="Signal level meter">
      <!-- level meter: lowest z-index, animated from live peakDb -->
      <div
        class="level-meter"
        [class.level-meter--clipping]="channel.meter?.clipping"
        role="meter"
        [attr.aria-valuenow]="channel.meter?.peakDb ?? -100"
        aria-valuemin="-60"
        aria-valuemax="0"
      >
        <div
          class="level-meter__fill"
          [style.clip-path]="'inset(' + (100 - meterFillPct(channel.meter?.peakDb)) + '% 0 0 0)'"
        ></div>
      </div>

      <img
        class="mixer-level"
        [src]="figmaAssets.mixerLevel"
        alt="Mixer level"
      />

      <div
        class="gain-drag-track"
        (pointerdown)="onGainDragStart($event, channel.id)"
        (pointermove)="onGainDragMove($event)"
        (pointerup)="onGainDragEnd($event)"
        (pointercancel)="onGainDragEnd($event)"
        aria-hidden="true"
      >
        <div
          class="gain-control"
          [style.top.px]="gainControlTopPx(channel.gainDb)"
        >
          <span class="gain-control-line" aria-hidden="true"></span>
        </div>
      </div>

      <img
        class="pan-indicator"
        [src]="figmaAssets.panIndicator"
        alt="Pan indicator"
      />
      <img
        class="pan-control"
        [src]="figmaAssets.panControl"
        alt="Pan control"
        [style.left.%]="panControlLeftPct(channel.pan)"
      />

      <div
        class="pan-drag-track"
        (pointerdown)="onPanDragStart($event, channel.id)"
        (pointermove)="onPanDragMove($event)"
        (pointerup)="onPanDragEnd($event)"
        (pointercancel)="onPanDragEnd($event)"
        aria-hidden="true"
      ></div>

      <input
        class="hidden-gain-input"
        type="range"
        min="-60"
        max="12"
        step="0.1"
        [id]="channel.id + '-gain'"
        [value]="channel.gainDb"
        (input)="onGainChange(channel.id, +$any($event.target).value)"
        aria-label="Gain"
      />

      <input
        class="hidden-pan-input"
        type="range"
        min="-1"
        max="1"
        step="0.01"
        [id]="channel.id + '-pan'"
        [value]="channel.pan"
        (input)="onPanChange(channel.id, +$any($event.target).value)"
        aria-label="Pan"
      />
    </div>

    <div class="meter-readout">
      Peak: {{ channel.meter?.peakDb ?? -100 | number: '1.0-1' }} dB
    </div>

    <div class="control-stack">
      <label class="channel-control" [for]="channel.id + '-gain'">
        Gain (dB)
      </label>
      <input
        class="channel-slider"
        type="range"
        min="-60"
        max="12"
        step="0.1"
        [id]="channel.id + '-gain'"
        [value]="channel.gainDb"
        (input)="onGainChange(channel.id, +$any($event.target).value)"
      />
      <output>{{ channel.gainDb | number: '1.0-1' }} dB</output>

      <label class="channel-control" [for]="channel.id + '-pan'">Pan</label>
      <output>{{ channel.pan | number: '1.2-2' }}</output>
    </div>

    <div class="toggle-row">
      <button
        class="toggle-image toggle-image--solo"
        type="button"
        [class.toggle-image--active]="channel.solo"
        [attr.aria-pressed]="channel.solo"
        [attr.aria-label]="'Toggle solo for ' + channel.label"
        (click)="toggleSolo(channel.id, channel.solo)"
      >
        <svg
          width="47.5"
          height="47.5"
          viewBox="0 0 48 48"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <clipPath id="solo-clip">
            <rect width="47.5" height="47.5" fill="white" />
          </clipPath>
          <g clip-path="url(#solo-clip)">
            <path
              d="M36.44 0H11.06C4.95173 0 0 4.95173 0 11.06V36.44C0 42.5483 4.95173 47.5 11.06 47.5H36.44C42.5483 47.5 47.5 42.5483 47.5 36.44V11.06C47.5 4.95173 42.5483 0 36.44 0Z"
              fill="currentColor"
            />
            <path
              d="M23.75 28.37C26.81 28.37 29.27 25.9 29.27 22.83L29.29 11.75C29.29 8.69002 26.82 6.21002 23.75 6.21002C20.68 6.21002 18.21 8.68002 18.21 11.75V22.83C18.21 25.89 20.68 28.37 23.75 28.37ZM33.54 22.83C33.54 28.37 28.85 32.25 23.75 32.25C18.65 32.25 13.96 28.37 13.96 22.83H10.82C10.82 29.13 15.84 34.33 21.9 35.24V41.3H25.59V35.24C31.65 34.35 36.67 29.15 36.67 22.83H33.53H33.54Z"
              fill="black"
            />
          </g>
        </svg>
      </button>

      <button
        class="toggle-image toggle-image--mute"
        type="button"
        [class.toggle-image--active]="channel.muted"
        [attr.aria-pressed]="channel.muted"
        [attr.aria-label]="'Toggle mute for ' + channel.label"
        (click)="toggleMuted(channel.id, channel.muted)"
      >
        <svg
          width="47.5"
          height="47.5"
          viewBox="0 0 48 48"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <clipPath id="mute-clip">
            <rect width="47.5" height="47.5" fill="white" />
          </clipPath>
          <g clip-path="url(#mute-clip)">
            <path
              d="M36.44 0H11.06C4.95173 0 0 4.95173 0 11.06V36.44C0 42.5483 4.95173 47.5 11.06 47.5H36.44C42.5483 47.5 47.5 42.5483 47.5 36.44V11.06C47.5 4.95173 42.5483 0 36.44 0Z"
              fill="currentColor"
            />
            <path
              d="M12.74 17.12V30.47H21.64L32.76 41.59V6L21.64 17.12H12.74Z"
              fill="black"
            />
          </g>
        </svg>
      </button>
    </div>
  </article>
  }
</section>
