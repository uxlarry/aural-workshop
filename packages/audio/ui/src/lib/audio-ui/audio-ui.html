<section class="audio-mixer">
  @for (channel of channels(); track channel.id) {
  <audio-channel-strip
    [channel]="channel"
    (parameterChange)="parameterChange.emit($event)"
    (effectSelected)="effectSelected.emit($event)"
    (addEffectRequested)="addEffectRequested.emit($event)"
    (effectReordered)="effectReordered.emit($event)"
  />
  }
</section>
